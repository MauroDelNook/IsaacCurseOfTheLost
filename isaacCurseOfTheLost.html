<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13x13 Grid Marker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .container {
            background-color: #34495e;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            max-width: 100%;
            overflow: auto;
        }
        
        h1 {
            color: #ecf0f1;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        .instructions {
            color: #bdc3c7;
            text-align: center;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.4;
        }
        
        .grid-container {
            display: inline-block;
            position: relative;
            margin-bottom: 25px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(13, 40px);
            grid-template-rows: repeat(13, 40px);
            gap: 0;
            border: 2px solid #7f8c8d;
            background-color: #636e72;
        }
        
        .cell {
            width: 40px;
            height: 40px;
            box-sizing: border-box;
            border: 1px solid #7f8c8d;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }
        
        .cell:hover {
            background-color: #81ecec !important;
        }
        
        .cell.marked-white {
            background-color: #ffffff;
        }
        
        .cell.marked-black {
            background-color: #2d3436;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .color-selector {
            display: flex;
            gap: 15px;
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 10px;
            align-items: center;
        }
        
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.selected {
            border-color: #f1c40f;
            transform: scale(1.1);
        }
        
        .color-white {
            background-color: #ffffff;
        }
        
        .color-black {
            background-color: #2d3436;
        }
        
        .current-color {
            font-weight: 600;
            color: #ecf0f1;
            min-width: 80px;
            text-align: center;
        }
        
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .clear-btn {
            background-color: #e74c3c;
        }
        
        .clear-btn:hover {
            background-color: #c0392b;
        }
        
        .download-btn {
            background-color: #2ecc71;
        }
        
        .download-btn:hover {
            background-color: #27ae60;
        }
        
        .nav-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 10px;
        }
        
        .nav-title {
            color: #ecf0f1;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .nav-row {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        
        .footer {
            color: #95a5a6;
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(13, 30px);
                grid-template-rows: repeat(13, 30px);
            }
            
            .cell {
                width: 30px;
                height: 30px;
            }
            
            .container {
                padding: 15px;
            }
            
            .nav-btn {
                width: 50px;
                height: 50px;
            }
        }
        
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(13, 20px);
                grid-template-rows: repeat(13, 20px);
            }
            
            .cell {
                width: 20px;
                height: 20px;
            }
            
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>13×13 Grid Marker</h1>
        
        <p class="instructions">
            Click on any cell to mark it with your selected color.<br>
            Click again to remove the mark. Use arrow buttons to move all marked cells.
        </p>
        
        <center>
            <div class="grid-container">
                <div class="grid" id="grid"></div>
            </div>
        </center>
        
        <div class="nav-controls">
            <div class="nav-title">Move Marked Cells</div>
            <div class="nav-row">
                <button class="nav-btn" id="up-btn">↑</button>
            </div>
            <div class="nav-row">
                <button class="nav-btn" id="left-btn">←</button>
                <button class="nav-btn" id="down-btn">↓</button>
                <button class="nav-btn" id="right-btn">→</button>
            </div>
        </div>
        
        <div class="controls">
            <div class="color-selector">
                <span class="current-color">Selected: White</span>
                <div class="color-option color-white selected" data-color="white"></div>
                <div class="color-option color-black" data-color="black"></div>
            </div>
            
            <button id="clear-btn" class="clear-btn">Clear Grid</button>
            <button id="download-btn" class="download-btn">Download PNG</button>
        </div>
        
        <p class="footer">
            Click any cell to mark it. Click again to remove the mark.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('grid');
            const clearBtn = document.getElementById('clear-btn');
            const downloadBtn = document.getElementById('download-btn');
            const colorOptions = document.querySelectorAll('.color-option');
            const currentColorText = document.querySelector('.current-color');
            
            // Navigation buttons
            const upBtn = document.getElementById('up-btn');
            const downBtn = document.getElementById('down-btn');
            const leftBtn = document.getElementById('left-btn');
            const rightBtn = document.getElementById('right-btn');
            
            let selectedColor = 'white';
            let markedCells = {};
            
            // Create the grid
            for (let row = 0; row < 13; row++) {
                for (let col = 0; col < 13; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    cell.addEventListener('click', function() {
                        const row = parseInt(this.dataset.row);
                        const col = parseInt(this.dataset.col);
                        const cellKey = `${row}-${col}`;
                        
                        if (markedCells[cellKey] === selectedColor) {
                            // Remove mark if already marked with current color
                            delete markedCells[cellKey];
                            this.classList.remove('marked-white', 'marked-black');
                        } else {
                            // Add mark with selected color
                            markedCells[cellKey] = selectedColor;
                            this.classList.remove('marked-white', 'marked-black');
                            this.classList.add(`marked-${selectedColor}`);
                        }
                    });
                    
                    grid.appendChild(cell);
                }
            }
            
            // Clear button functionality
            clearBtn.addEventListener('click', function() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.classList.remove('marked-white', 'marked-black');
                });
                markedCells = {};
            });
            
            // Download button functionality
            downloadBtn.addEventListener('click', function() {
                // Create a canvas to draw the grid
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const size = 500; // Size of the output image
                const cellSize = size / 13;
                
                canvas.width = size;
                canvas.height = size;
                
                // Draw background
                ctx.fillStyle = '#636e72';
                ctx.fillRect(0, 0, size, size);
                
                // Draw grid lines
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 1;
                
                for (let i = 0; i <= 13; i++) {
                    // Vertical lines
                    ctx.beginPath();
                    ctx.moveTo(i * cellSize, 0);
                    ctx.lineTo(i * cellSize, size);
                    ctx.stroke();
                    
                    // Horizontal lines
                    ctx.beginPath();
                    ctx.moveTo(0, i * cellSize);
                    ctx.lineTo(size, i * cellSize);
                    ctx.stroke();
                }
                
                // Draw marked cells
                for (let row = 0; row < 13; row++) {
                    for (let col = 0; col < 13; col++) {
                        const cellKey = `${row}-${col}`;
                        if (markedCells[cellKey]) {
                            if (markedCells[cellKey] === 'white') {
                                ctx.fillStyle = '#ffffff';
                            } else {
                                ctx.fillStyle = '#000000'; // Use pure black for PNG
                            }
                            ctx.fillRect(col * cellSize + 1, row * cellSize + 1, cellSize - 2, cellSize - 2);
                        }
                    }
                }
                
                // Create download link
                const link = document.createElement('a');
                link.download = 'grid.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
            
            // Color selection functionality
            colorOptions.forEach(option => {
                option.addEventListener('click', function() {
                    selectedColor = this.dataset.color;
                    currentColorText.textContent = `Selected: ${selectedColor.charAt(0).toUpperCase() + selectedColor.slice(1)}`;
                    
                    // Update selected style
                    colorOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
            
            // Navigation button functionality - move all marked cells
            upBtn.addEventListener('click', function() {
                moveMarkedCells('up');
            });
            
            downBtn.addEventListener('click', function() {
                moveMarkedCells('down');
            });
            
            leftBtn.addEventListener('click', function() {
                moveMarkedCells('left');
            });
            
            rightBtn.addEventListener('click', function() {
                moveMarkedCells('right');
            });
            
            // Function to move all marked cells in a direction
            function moveMarkedCells(direction) {
                const newMarkedCells = {};
                const cells = document.querySelectorAll('.cell');
                
                // First, clear all marks from the grid
                cells.forEach(cell => {
                    cell.classList.remove('marked-white', 'marked-black');
                });
                
                // Calculate new positions for marked cells
                for (const key in markedCells) {
                    if (markedCells.hasOwnProperty(key)) {
                        const [row, col] = key.split('-').map(Number);
                        let newRow = row;
                        let newCol = col;
                        
                        switch (direction) {
                            case 'up':
                                newRow = row - 1;
                                break;
                            case 'down':
                                newRow = row + 1;
                                break;
                            case 'left':
                                newCol = col - 1;
                                break;
                            case 'right':
                                newCol = col + 1;
                                break;
                        }
                        
                        // Only keep the mark if it's still within the grid
                        if (newRow >= 0 && newRow < 13 && newCol >= 0 && newCol < 13) {
                            const newKey = `${newRow}-${newCol}`;
                            newMarkedCells[newKey] = markedCells[key];
                            
                            // Update the visual grid
                            const cell = document.querySelector(`.cell[data-row="${newRow}"][data-col="${newCol}"]`);
                            if (cell) {
                                cell.classList.add(`marked-${markedCells[key]}`);
                            }
                        }
                    }
                }
                
                // Update the marked cells data
                markedCells = newMarkedCells;
            }
        });
    </script>
</body>
</html>
