<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13x13 Grid Marker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .container {
            background-color: #34495e;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            max-width: 100%;
            overflow: auto;
        }
        
        h1 {
            color: #ecf0f1;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        .instructions {
            color: #bdc3c7;
            text-align: center;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.4;
        }
        
        .grid-container {
            display: inline-block;
            position: relative;
            margin-bottom: 25px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(13, 40px);
            grid-template-rows: repeat(13, 40px);
            gap: 0;
            border: 2px solid #7f8c8d;
            background-color: #636e72;
        }
        
        .cell {
            width: 40px;
            height: 40px;
            box-sizing: border-box;
            border: 1px solid #7f8c8d;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }
        
        .cell:hover {
            background-color: #81ecec !important;
        }
        
        .cell.marked-white {
            background-color: #ffffff;
        }
        
        .cell.marked-black {
            background-color: #2d3436;
        }
        
        .cell.selected {
            box-shadow: 0 0 0 3px #f1c40f inset;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .color-selector {
            display: flex;
            gap: 15px;
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 10px;
            align-items: center;
        }
        
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.selected {
            border-color: #f1c40f;
            transform: scale(1.1);
        }
        
        .color-white {
            background-color: #ffffff;
        }
        
        .color-black {
            background-color: #2d3436;
        }
        
        .current-color {
            font-weight: 600;
            color: #ecf0f1;
            min-width: 80px;
            text-align: center;
        }
        
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .clear-btn {
            background-color: #e74c3c;
        }
        
        .clear-btn:hover {
            background-color: #c0392b;
        }
        
        .nav-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .nav-row {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        
        .footer {
            color: #95a5a6;
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(13, 30px);
                grid-template-rows: repeat(13, 30px);
            }
            
            .cell {
                width: 30px;
                height: 30px;
            }
            
            .container {
                padding: 15px;
            }
            
            .nav-btn {
                width: 50px;
                height: 50px;
            }
        }
        
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(13, 20px);
                grid-template-rows: repeat(13, 20px);
            }
            
            .cell {
                width: 20px;
                height: 20px;
            }
            
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
        
        /* Print styles */
        @media print {
            body, .container {
                background-color: white;
                color: black;
                box-shadow: none;
                padding: 0;
                margin: 0;
            }
            
            .controls, .nav-controls, .footer, h1, .instructions {
                display: none;
            }
            
            .grid-container {
                margin: 0;
            }
            
            .grid {
                border: 1px solid black;
            }
            
            .cell {
                border: 1px solid #ccc;
                width: 30px;
                height: 30px;
            }
            
            .cell.marked-white {
                background-color: #ffffff;
                border: 1px solid black;
            }
            
            .cell.marked-black {
                background-color: #000000;
                border: 1px solid black;
            }
            
            .cell.selected {
                box-shadow: none;
                border: 2px solid black;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>13×13 Grid Marker</h1>
        
        <p class="instructions">
            Click on any cell to mark it with your selected color.<br>
            Click again to remove the mark. Use arrow keys or buttons to navigate.
        </p>
        
        <center>
            <div class="grid-container">
                <div class="grid" id="grid"></div>
            </div>
        </center>
        
        <div class="nav-controls">
            <div class="nav-row">
                <button class="nav-btn" id="up-btn">↑</button>
            </div>
            <div class="nav-row">
                <button class="nav-btn" id="left-btn">←</button>
                <button class="nav-btn" id="down-btn">↓</button>
                <button class="nav-btn" id="right-btn">→</button>
            </div>
        </div>
        
        <div class="controls">
            <div class="color-selector">
                <span class="current-color">Selected: White</span>
                <div class="color-option color-white selected" data-color="white"></div>
                <div class="color-option color-black" data-color="black"></div>
            </div>
            
            <button id="clear-btn" class="clear-btn">Clear Grid</button>
            <button id="print-btn">Print/Save Grid</button>
        </div>
        
        <p class="footer">
            Click any cell to mark it. Click again to remove the mark.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('grid');
            const clearBtn = document.getElementById('clear-btn');
            const printBtn = document.getElementById('print-btn');
            const colorOptions = document.querySelectorAll('.color-option');
            const currentColorText = document.querySelector('.current-color');
            
            // Navigation buttons
            const upBtn = document.getElementById('up-btn');
            const downBtn = document.getElementById('down-btn');
            const leftBtn = document.getElementById('left-btn');
            const rightBtn = document.getElementById('right-btn');
            
            let selectedColor = 'white';
            let markedCells = {};
            let selectedCell = { row: 6, col: 6 }; // Start in the middle
            
            // Create the grid
            for (let row = 0; row < 13; row++) {
                for (let col = 0; col < 13; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    cell.addEventListener('click', function() {
                        const row = parseInt(this.dataset.row);
                        const col = parseInt(this.dataset.col);
                        const cellKey = `${row}-${col}`;
                        
                        // Update selection
                        updateSelectedCell(row, col);
                        
                        if (markedCells[cellKey] === selectedColor) {
                            // Remove mark if already marked with current color
                            delete markedCells[cellKey];
                            this.classList.remove('marked-white', 'marked-black');
                        } else {
                            // Add mark with selected color
                            markedCells[cellKey] = selectedColor;
                            this.classList.remove('marked-white', 'marked-black');
                            this.classList.add(`marked-${selectedColor}`);
                        }
                    });
                    
                    grid.appendChild(cell);
                }
            }
            
            // Initialize with a selected cell
            updateSelectedCell(selectedCell.row, selectedCell.col);
            
            // Clear button functionality
            clearBtn.addEventListener('click', function() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.classList.remove('marked-white', 'marked-black');
                });
                markedCells = {};
            });
            
            // Print button functionality
            printBtn.addEventListener('click', function() {
                window.print();
            });
            
            // Color selection functionality
            colorOptions.forEach(option => {
                option.addEventListener('click', function() {
                    selectedColor = this.dataset.color;
                    currentColorText.textContent = `Selected: ${selectedColor.charAt(0).toUpperCase() + selectedColor.slice(1)}`;
                    
                    // Update selected style
                    colorOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
            
            // Navigation button functionality
            upBtn.addEventListener('click', function() {
                if (selectedCell.row > 0) {
                    updateSelectedCell(selectedCell.row - 1, selectedCell.col);
                }
            });
            
            downBtn.addEventListener('click', function() {
                if (selectedCell.row < 12) {
                    updateSelectedCell(selectedCell.row + 1, selectedCell.col);
                }
            });
            
            leftBtn.addEventListener('click', function() {
                if (selectedCell.col > 0) {
                    updateSelectedCell(selectedCell.row, selectedCell.col - 1);
                }
            });
            
            rightBtn.addEventListener('click', function() {
                if (selectedCell.col < 12) {
                    updateSelectedCell(selectedCell.row, selectedCell.col + 1);
                }
            });
            
            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                switch(e.key) {
                    case 'ArrowUp':
                        if (selectedCell.row > 0) {
                            updateSelectedCell(selectedCell.row - 1, selectedCell.col);
                        }
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                        if (selectedCell.row < 12) {
                            updateSelectedCell(selectedCell.row + 1, selectedCell.col);
                        }
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        if (selectedCell.col > 0) {
                            updateSelectedCell(selectedCell.row, selectedCell.col - 1);
                        }
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        if (selectedCell.col < 12) {
                            updateSelectedCell(selectedCell.row, selectedCell.col + 1);
                        }
                        e.preventDefault();
                        break;
                    case ' ':
                        // Mark/unmark current cell with spacebar
                        const cellKey = `${selectedCell.row}-${selectedCell.col}`;
                        const cell = document.querySelector(`.cell[data-row="${selectedCell.row}"][data-col="${selectedCell.col}"]`);
                        
                        if (markedCells[cellKey] === selectedColor) {
                            // Remove mark if already marked with current color
                            delete markedCells[cellKey];
                            cell.classList.remove('marked-white', 'marked-black');
                        } else {
                            // Add mark with selected color
                            markedCells[cellKey] = selectedColor;
                            cell.classList.remove('marked-white', 'marked-black');
                            cell.classList.add(`marked-${selectedColor}`);
                        }
                        e.preventDefault();
                        break;
                }
            });
            
            // Function to update the selected cell
            function updateSelectedCell(row, col) {
                // Remove selection from previous cell
                const prevCell = document.querySelector(`.cell[data-row="${selectedCell.row}"][data-col="${selectedCell.col}"]`);
                if (prevCell) {
                    prevCell.classList.remove('selected');
                }
                
                // Update selected cell
                selectedCell = { row, col };
                
                // Add selection to new cell
                const newCell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
                if (newCell) {
                    newCell.classList.add('selected');
                    
                    // Scroll into view if needed (for mobile)
                    newCell.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                }
            }
        });
    </script>
</body>
</html>
